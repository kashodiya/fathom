<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AI Research Agent</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vuetify@3.12.5/dist/vuetify.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@latest/css/materialdesignicons.min.css"/>
  <style>
    .report-content h1 { font-size:1.6rem; font-weight:700; margin:1.2rem 0 0.6rem; }
    .report-content h2 { font-size:1.3rem; font-weight:600; margin:1rem 0 0.5rem; }
    .report-content h3 { font-size:1.1rem; font-weight:600; margin:0.8rem 0 0.4rem; }
    .report-content p  { margin:0.5rem 0; line-height:1.7; }
    .report-content ul, .report-content ol { margin:0.5rem 0 0.5rem 1.5rem; }
    .report-content li { margin:0.25rem 0; }
    .report-content table { border-collapse:collapse; width:100%; margin:1rem 0; }
    .report-content th, .report-content td { border:1px solid #ddd; padding:8px 12px; text-align:left; }
    .report-content th { background:#f5f5f5; font-weight:600; }
    .report-content code { background:#f4f4f4; padding:2px 6px; border-radius:3px; font-size:0.9em; }
    .report-content pre { background:#f4f4f4; padding:1rem; border-radius:6px; overflow-x:auto; }
    .report-content blockquote { border-left:4px solid #ddd; padding-left:1rem; color:#666; margin:0.5rem 0; }
    .report-content hr { border:none; border-top:1px solid #eee; margin:1rem 0; }
    .src-link { color:#1565c0; font-weight:600; text-decoration:none; font-size:0.85em; vertical-align:super; }
    .src-link:hover { text-decoration:underline; }
    .job-row { font-size:0.85rem; }
    .src-chip { font-size:0.75rem; }
  </style>
</head>
<body>
<div id="app">
  <v-app>
    <v-app-bar color="primary" elevation="2">
      <v-app-bar-title>
        <v-icon class="mr-2">mdi-magnify-scan</v-icon>
        AI Research Agent
      </v-app-bar-title>
      <v-btn icon="mdi-plus" variant="text" @click="$router.push('/new')" title="New Research"/>
    </v-app-bar>

    <v-main>
      <router-view/>
    </v-main>
  </v-app>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vuetify@3.12.5/dist/vuetify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue-router@4/dist/vue-router.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html.min.js"></script>

<script>
const { createApp, ref, computed, onMounted, onUnmounted } = Vue;
const { createVuetify }  = Vuetify;
const { createRouter, createWebHashHistory } = VueRouter;

// ── API helpers ───────────────────────────────────────────────────────────────
const api = {
  get:    (url)      => fetch(url).then(r => r.json()),
  post:   (url, body) => fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }).then(r => r.json()),
  delete: (url)      => fetch(url, { method:'DELETE' }).then(r => r.json()),
};

// ── Job helpers ───────────────────────────────────────────────────────────────
const JOB_ICONS = {
  search_google:      { icon:'mdi-google',              color:'blue',        label:'Google' },
  search_youtube:     { icon:'mdi-youtube',             color:'red',         label:'YouTube' },
  get_video_metadata: { icon:'mdi-information-outline', color:'purple',      label:'Metadata' },
  get_transcript:     { icon:'mdi-closed-caption',      color:'deep-purple', label:'Transcript' },
  scrape_page:        { icon:'mdi-web',                 color:'teal',        label:'Web' },
  bedrock_call:       { icon:'mdi-brain',               color:'orange',      label:'AI thinking' },
  test:               { icon:'mdi-flask',               color:'grey',        label:'Test' },
};
const STATUS_COLOR = { pending:'grey', running:'blue', done:'green', failed:'red' };

function jobLabel(job) {
  const p = job.payload;
  if (p.query)     return p.query;
  if (p.url)       return p.url.replace(/^https?:\/\//, '').substring(0, 60);
  if (p.iteration) return `Iteration ${p.iteration}`;
  return job.type;
}

// ── Home view ─────────────────────────────────────────────────────────────────
const HomeView = {
  template: `
  <v-container>
    <v-row class="mb-2" align="center">
      <v-col><h2 class="text-h5">Research Projects</h2></v-col>
      <v-col cols="auto">
        <v-btn color="primary" prepend-icon="mdi-plus" to="/new">New Research</v-btn>
      </v-col>
    </v-row>

    <v-text-field v-model="search" prepend-inner-icon="mdi-magnify" placeholder="Filter..." density="compact" variant="outlined" clearable class="mb-3"/>

    <v-progress-linear v-if="loading" indeterminate color="primary" class="mb-3"/>

    <v-card v-if="!loading && !filtered.length" variant="outlined" class="text-center pa-8 text-grey">
      No research yet. Click <strong>New Research</strong> to start.
    </v-card>

    <v-card v-for="r in filtered" :key="r.id" class="mb-3" hover :to="'/research/'+r.slug">
      <v-card-item>
        <v-card-title class="text-body-1 font-weight-medium text-wrap">{{ r.topic.substring(0,120) }}{{ r.topic.length>120?'...':'' }}</v-card-title>
        <v-card-subtitle class="mt-1">
          <v-chip size="x-small" :color="statusColor(r.status)" class="mr-2">{{ r.status }}</v-chip>
          <span class="text-caption text-grey">{{ formatDate(r.created_at) }}</span>
          <span class="text-caption text-grey ml-3">{{ r.sources_config }}</span>
        </v-card-subtitle>
      </v-card-item>
    </v-card>
  </v-container>`,
  setup() {
    const list = ref([]);
    const search = ref('');
    const loading = ref(true);
    let timer = null;

    const filtered = computed(() =>
      list.value.filter(r => !search.value || r.topic.toLowerCase().includes(search.value.toLowerCase()))
    );

    async function load() {
      list.value = await api.get('/research');
      loading.value = false;
    }

    onMounted(() => { load(); timer = setInterval(load, 5000); });
    onUnmounted(() => clearInterval(timer));

    return { list, search, loading, filtered,
      statusColor: s => STATUS_COLOR[s] || 'grey',
      formatDate: d => d ? new Date(d).toLocaleString() : '',
    };
  }
};

// ── New Research view ─────────────────────────────────────────────────────────
const NewResearchView = {
  template: `
  <v-container max-width="700">
    <v-btn variant="text" prepend-icon="mdi-arrow-left" to="/" class="mb-4">Back</v-btn>
    <h2 class="text-h5 mb-4">New Research</h2>
    <v-card variant="outlined" class="pa-4">
      <v-textarea v-model="form.topic" label="Research Brief" placeholder="Describe what you want to research, the angle you care about, and the desired outcome..." rows="5" variant="outlined" class="mb-3"/>

      <v-textarea v-model="seedUrls" label="Seed URLs (optional)" placeholder="One URL per line — pages the agent must read first" rows="3" variant="outlined" class="mb-3"/>

      <v-row>
        <v-col cols="12" sm="6">
          <v-select v-model="form.sources_config" :items="sourceOptions" label="Sources" variant="outlined"/>
        </v-col>
        <v-col cols="12" sm="6">
          <v-select v-model="form.parallelism" :items="[1,2,3]" label="Parallelism" variant="outlined"/>
        </v-col>
      </v-row>

      <v-alert v-if="error" type="error" class="mb-3">{{ error }}</v-alert>

      <v-btn color="primary" :loading="saving" :disabled="!form.topic.trim()" @click="submit" block>
        Start Research
      </v-btn>
    </v-card>
  </v-container>`,
  setup() {
    const router = VueRouter.useRouter();
    const form = ref({ topic:'', sources_config:'both', parallelism:1 });
    const seedUrls = ref('');
    const saving = ref(false);
    const error = ref('');
    const sourceOptions = [
      { title:'Web + YouTube', value:'both' },
      { title:'Web only', value:'web' },
      { title:'YouTube only', value:'youtube' },
    ];

    async function submit() {
      saving.value = true; error.value = '';
      const seeds = seedUrls.value.split('\n').map(u=>u.trim()).filter(Boolean);
      const body = { ...form.value, seed_urls: seeds };
      const res = await api.post('/research', body);
      if (res.detail) { error.value = res.detail; saving.value = false; return; }
      router.push('/research/' + res.slug);
    }

    return { form, seedUrls, saving, error, sourceOptions, submit };
  }
};

// ── Research view ─────────────────────────────────────────────────────────────
const ResearchView = {
  template: `
  <v-container fluid>
    <v-row align="center" class="mb-2 px-2">
      <v-col>
        <v-btn variant="text" prepend-icon="mdi-arrow-left" to="/" size="small">Back</v-btn>
        <v-chip size="small" :color="statusColor(research.status)" class="ml-3">{{ research.status }}</v-chip>
        <v-progress-circular v-if="research.status==='running'" indeterminate size="16" color="primary" class="ml-2"/>
      </v-col>
      <v-col cols="auto" class="d-flex gap-2 align-center">
        <!-- Export menu -->
        <v-menu v-if="research.report">
          <template #activator="{ props }">
            <v-btn size="small" variant="outlined" prepend-icon="mdi-export" v-bind="props">Export</v-btn>
          </template>
          <v-list density="compact">
            <v-list-item prepend-icon="mdi-language-markdown" title="Markdown" @click="exportAs('md')"/>
            <v-list-item prepend-icon="mdi-text" title="Plain text" @click="exportAs('txt')"/>
            <v-list-item prepend-icon="mdi-file-pdf-box" title="PDF" @click="exportAs('pdf')"/>
          </v-list>
        </v-menu>
        <!-- Stop button (running) / Refresh button (idle) -->
        <v-btn v-if="research.status==='running'" size="small" variant="outlined"
          prepend-icon="mdi-stop-circle-outline" color="warning"
          :loading="stopping" @click="stopResearch">Stop</v-btn>
        <v-btn v-else size="small" variant="outlined" prepend-icon="mdi-refresh" color="primary"
          @click="refreshDialog=true">Refresh</v-btn>
        <v-btn size="small" variant="outlined" prepend-icon="mdi-delete" color="error" @click="deleteResearch">Delete</v-btn>
      </v-col>
    </v-row>

    <div class="text-body-2 text-grey px-2 mb-3">{{ research.topic }}</div>

    <v-row>
      <!-- Main: Report -->
      <v-col cols="12" md="8">
        <v-card variant="outlined">
          <v-card-text>
            <div v-if="!research.report" class="text-grey text-center pa-8">
              <v-progress-circular v-if="research.status==='running'" indeterminate color="primary" class="mb-3"/><br/>
              {{ research.status === 'running' ? 'Research in progress...' : 'No report yet.' }}
            </div>
            <div v-else class="report-content" v-html="renderedReport"/>
          </v-card-text>
        </v-card>
      </v-col>

      <!-- Sidebar -->
      <v-col cols="12" md="4">
        <v-card variant="outlined">
          <v-tabs v-model="tab" density="compact">
            <v-tab value="activity">
              <v-icon size="small" class="mr-1">mdi-pulse</v-icon>Activity
              <v-badge v-if="jobs.length" :content="jobs.length" color="grey" inline/>
            </v-tab>
            <v-tab value="sources">
              <v-icon size="small" class="mr-1">mdi-book-open-outline</v-icon>Sources
              <v-badge v-if="sources.length" :content="sources.length" color="teal" inline/>
            </v-tab>
            <v-tab value="history">
              <v-icon size="small" class="mr-1">mdi-history</v-icon>History
            </v-tab>
          </v-tabs>
          <v-divider/>

          <v-window v-model="tab">
            <!-- Activity tab -->
            <v-window-item value="activity">
              <v-list density="compact" class="pa-0" style="max-height:70vh;overflow-y:auto">
                <v-list-item v-if="!jobs.length" class="text-grey text-center">No activity yet</v-list-item>
                <v-list-item v-for="job in [...jobs].reverse()" :key="job.id" class="job-row py-1">
                  <template #prepend>
                    <v-icon :color="jobInfo(job.type).color" size="small">{{ jobInfo(job.type).icon }}</v-icon>
                  </template>
                  <v-list-item-title class="text-caption text-wrap">{{ jobLabel(job) }}</v-list-item-title>
                  <v-list-item-subtitle class="text-caption">{{ jobInfo(job.type).label }}</v-list-item-subtitle>
                  <template #append>
                    <v-chip size="x-small" :color="statusColor(job.status)">{{ job.status }}</v-chip>
                  </template>
                </v-list-item>
              </v-list>
            </v-window-item>

            <!-- Sources tab -->
            <v-window-item value="sources">
              <v-list density="compact" class="pa-0" style="max-height:70vh;overflow-y:auto">
                <v-list-item v-if="!sources.length" class="text-grey text-center">No sources yet</v-list-item>
                <v-list-item v-for="src in sources" :key="src.id" class="py-2">
                  <template #prepend>
                    <v-icon :color="src.type==='youtube'?'red':'teal'" size="small">
                      {{ src.type==='youtube' ? 'mdi-youtube' : 'mdi-web' }}
                    </v-icon>
                  </template>
                  <v-list-item-title class="text-caption text-wrap">
                    <a :href="src.url" target="_blank" class="text-decoration-none">{{ src.title || src.url }}</a>
                  </v-list-item-title>
                  <v-list-item-subtitle class="text-caption">{{ src.scraped_at }}</v-list-item-subtitle>
                </v-list-item>
              </v-list>
            </v-window-item>

            <!-- History tab -->
            <v-window-item value="history">
              <div style="max-height:70vh;overflow-y:auto">
                <v-list density="compact" class="pa-0">
                  <v-list-item v-if="!history.length" class="text-grey text-center">No history yet</v-list-item>
                  <v-list-item v-for="c in history" :key="c.hash" class="py-2" @click="viewDiff(c.hash)" style="cursor:pointer">
                    <v-list-item-title class="text-caption font-weight-medium text-wrap">{{ c.message.split('\\n')[0] }}</v-list-item-title>
                    <v-list-item-subtitle class="text-caption">{{ formatDate(c.date) }}</v-list-item-subtitle>
                    <template #append>
                      <v-icon size="small" color="grey">mdi-chevron-right</v-icon>
                    </template>
                  </v-list-item>
                </v-list>
              </div>
            </v-window-item>
          </v-window>
        </v-card>
      </v-col>
    </v-row>

    <!-- Refresh dialog -->
    <v-dialog v-model="refreshDialog" max-width="500">
      <v-card>
        <v-card-title>Refresh Research</v-card-title>
        <v-card-text>
          <p class="text-body-2 mb-3">Leave blank for a full refresh, or describe a specific aspect to update.</p>
          <v-textarea v-model="refreshAspect" label="Aspect to refresh (optional)"
            placeholder="e.g. 'update pricing section only' or 'find latest news from last 2 weeks'"
            rows="3" variant="outlined"/>
        </v-card-text>
        <v-card-actions>
          <v-spacer/>
          <v-btn variant="text" @click="refreshDialog=false">Cancel</v-btn>
          <v-btn color="primary" :loading="refreshing" @click="doRefresh">
            {{ refreshAspect.trim() ? 'Partial Refresh' : 'Full Refresh' }}
          </v-btn>
        </v-card-actions>
      </v-card>
    </v-dialog>

    <!-- Diff dialog -->
    <v-dialog v-model="diffDialog" max-width="900" scrollable>
      <v-card>
        <v-card-title class="d-flex align-center">
          <span class="text-body-1">{{ diffCommit.message?.split('\\n')[0] }}</span>
          <v-spacer/>
          <v-btn icon="mdi-close" variant="text" @click="diffDialog=false"/>
        </v-card-title>
        <v-divider/>
        <v-card-text style="max-height:70vh;overflow-y:auto">
          <div v-if="diffCommit.message && diffCommit.message.includes('\\n')" class="text-caption text-grey mb-3 pa-2" style="white-space:pre-wrap;background:#f5f5f5;border-radius:4px">{{ diffCommit.message }}</div>
          <div v-html="renderedDiff" class="diff-container"/>
        </v-card-text>
      </v-card>
    </v-dialog>
  </v-container>`,
  setup() {
    const route  = VueRouter.useRoute();
    const router = VueRouter.useRouter();
    const slug   = route.params.slug;
    const research = ref({ topic:'', status:'', report:null });
    const jobs     = ref([]);
    const sources  = ref([]);
    const history  = ref([]);
    const tab          = ref('activity');
    let autoSwitched   = false;
    let timer          = null;

    // Stop
    const stopping = ref(false);
    async function stopResearch() {
      stopping.value = true;
      await api.post(`/research/${slug}/stop`, {});
      stopping.value = false;
    }

    // Refresh
    const refreshDialog = ref(false);
    const refreshAspect = ref('');
    const refreshing    = ref(false);

    // Diff
    const diffDialog  = ref(false);
    const diffCommit  = ref({ message:'', diff:'' });
    const renderedDiff = ref('');

    const renderedReport = computed(() => {
      if (!research.value.report) return '';
      // Primary map: by DB id (e.g. [src-42]). Fallback map: by 1-based position for
      // older reports where the agent used sequential numbering instead of DB ids.
      const srcMap = {};
      sources.value.forEach((s, i) => {
        srcMap[s.id] = { url: s.url, title: s.title || s.url };
        if (!srcMap[i + 1]) srcMap[i + 1] = { url: s.url, title: s.title || s.url };
      });
      let md = research.value.report
        .replace(/\|\s*ID\s*\|\s*Title\s*\|\s*URL\s*\|/gi, '| # | Source |')
        .replace(/^\|[-: ]+\|[-: ]+\|[-: ]+\|$/gm, '|---|---|')
        .replace(
          /\|\s*\[src-(\d+)\]\s*\|([^|\n]+)\|([^|\n]+)\|/g,
          (match, n, titleCell, urlCell) => {
            const src = srcMap[parseInt(n)];
            const url = src ? src.url : urlCell.trim();
            return `| ${n} | <a href="${url}" target="_blank" class="src-link">${titleCell.trim()}</a> |`;
          }
        )
        .replace(/\[src-(\d+)\]/g, (match, n) => {
          const src = srcMap[parseInt(n)];
          if (src) return `<a href="${src.url}" target="_blank" title="${src.title}" class="src-link">[${n}]</a>`;
          return match;
        });
      return marked.parse(md);
    });

    const statusColor  = s => STATUS_COLOR[s] || 'grey';
    const jobInfo      = t => JOB_ICONS[t] || { icon:'mdi-cog', color:'grey', label:t };
    const formatDate   = d => d ? new Date(d).toLocaleString() : '';

    async function load() {
      const [r, j, s] = await Promise.all([
        api.get(`/research/${slug}`),
        api.get(`/research/${slug}/jobs`),
        api.get(`/research/${slug}/sources`),
      ]);
      research.value = r;
      jobs.value     = j;
      sources.value  = s;
      if (s.length && !autoSwitched) { tab.value = 'sources'; autoSwitched = true; }
      if (r.status !== 'running') clearInterval(timer);
    }

    async function loadHistory() {
      history.value = await api.get(`/research/${slug}/history`);
    }

    async function doRefresh() {
      refreshing.value = true;
      await api.post(`/research/${slug}/refresh`, { aspect: refreshAspect.value });
      refreshDialog.value = false;
      refreshAspect.value = '';
      refreshing.value    = false;
      tab.value = 'activity';
      // restart polling
      clearInterval(timer);
      timer = setInterval(load, 3000);
      load();
    }

    async function viewDiff(hash) {
      const data = await api.get(`/research/${slug}/history/${hash}`);
      diffCommit.value = data;
      renderedDiff.value = data.diff
        ? Diff2Html.html(data.diff, { drawFileList: false, matching: 'lines', outputFormat: 'side-by-side' })
        : '<p class="text-grey">No changes in this commit.</p>';
      diffDialog.value = true;
    }

    function exportAs(format) {
      window.open(`/research/${slug}/export?format=${format}`, '_blank');
    }

    async function deleteResearch() {
      if (!confirm('Delete this research and all its data?')) return;
      await api.delete(`/research/${slug}`);
      router.push('/');
    }

    onMounted(() => { load(); loadHistory(); timer = setInterval(load, 3000); });
    onUnmounted(() => clearInterval(timer));

    return { research, jobs, sources, history, tab, renderedReport,
      statusColor, jobInfo, jobLabel, formatDate,
      stopping, stopResearch,
      refreshDialog, refreshAspect, refreshing, doRefresh,
      diffDialog, diffCommit, renderedDiff, viewDiff,
      exportAs, deleteResearch };
  }
};

// ── Router & App ──────────────────────────────────────────────────────────────
const router = createRouter({
  history: createWebHashHistory(),
  routes: [
    { path:'/',                component: HomeView },
    { path:'/new',             component: NewResearchView },
    { path:'/research/:slug',  component: ResearchView },
  ]
});

const vuetify = createVuetify({ theme:{ defaultTheme:'light' } });

createApp({ template:'<router-view/>' })
  .use(vuetify)
  .use(router)
  .mount('#app');
</script>
</body>
</html>
